- date: "2026-07-17"
  summary: "This week saw a significant market pullback, especially in the AI-related semiconductor sector represented by SMH. The overall tone of market commentary became noticeably more bearish, but I do not think the long-term outlook has changed."
  key_observation: "Short-term price movements can create a lot of noise, but they should always be interpreted together with macroeconomic data rather than market sentiment alone."
  market_notes:
    - "This week's drawdown widened across all three ETFs, with SMH deteriorating the most. Week-over-week returns also turned negative across all three ETFs, confirming the short-term weakness."
    - "Headline CPI inflation came in lower than expected (3.5% vs. 3.8% forecast), which I view as a positive sign for the long-term economy."
    - "Fed Chair Kevin Warsh emphasized the importance of obtaining a proper reading of economic conditions and reviewing the Fed's existing policy framework. He also maintained a hawkish stance on inflation and reaffirmed the Fed's commitment to restoring price stability."
    - "For now, I still believe the long-term economic outlook remains in good shape. I do not want short-term fluctuations and market noise to create unnecessary psychological pressure or influence my long-term investment decisions."

- date: "2026-07-10"
  summary: "This week was the first time I learned how to interpret drawdown and week-over-week return together. Before, I mostly focused on weekly returns. This week I realized that drawdown provides the long-term context that weekly performance alone cannot show."
  key_observation: "Weekly performance is more meaningful when viewed alongside each ETF's distance from its 52-week high."
  market_notes:
    - "VOO and QQQ have recovered most of their previous declines and remain close to their 52-week highs. The broader market appears to have regained most of its previous weakness."
    - "SMH posted the strongest weekly rebound, but it remains well below its previous high. The semiconductor sector is still in the recovery phase, and it is too early to tell whether this recovery will continue."
    - "Looking at these charts over time makes it much easier to identify trends. Instead of focusing on a single week's gain or loss, I can see whether each ETF is moving toward or away from its previous high."
