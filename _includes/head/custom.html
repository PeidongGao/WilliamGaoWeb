{% include base_path %}

<!-- start custom head snippets -->

{% include analytics.html %}

<!-- site favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="{{ base_path }}/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Person schema for AI and search discoverability -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "William (Peidong) Gao",
  "alternateName": ["Peidong Gao", "William Gao"],
  "url": "https://williampeidonggao.com",
  "image": "https://williampeidonggao.com/images/profile.2.png",
  "jobTitle": "Ph.D. Candidate in Genetics",
  "affiliation": {
    "@type": "CollegeOrUniversity",
    "name": "Case Western Reserve University"
  },
  "email": "mailto:{{ site.author.email }}",
  "sameAs": {{ site.social.links | jsonify }},
  "knowsAbout": [
    "Bioinformatics",
    "Computational biology",
    "Single-cell RNA sequencing",
    "Multi-omics analysis",
    "Computational genomics",
    "Human islet biology",
    "Diabetes",
    "Reproducible computational workflows"
  ]
}
</script>

<!-- WebSite schema for site-level AI and search discoverability -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "William Gao",
  "alternateName": "William (Peidong) Gao Academic Website",
  "url": "https://williampeidonggao.com",
  "description": {{ site.description | jsonify }},
  "publisher": {
    "@type": "Person",
    "name": "William (Peidong) Gao",
    "url": "https://williampeidonggao.com"
  },
  "inLanguage": "en-US"
}
</script>

<!-- Preload the primary self-hosted fonts for faster first paint -->
<link rel="preload" href="{{ base_path }}/assets/fonts/inter-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ base_path }}/assets/fonts/fraunces-normal.woff2" as="font" type="font/woff2" crossorigin>

<!-- MathJax: loaded only on pages that opt in with `mathjax: true` in front matter -->
{% if page.mathjax %}
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}

<!-- end custom head snippets -->
